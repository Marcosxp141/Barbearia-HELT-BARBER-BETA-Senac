    <h2>Formulário de cadastro</h2>

    <form>
        <p>
            <label for="cadastro_nome">Nome completo:</label>
            <input id="cadastro_nome" type="text" placeholder="Nome completo" required></input>
        </p>
        <p>
            <label for="cadastro_email">E-mail:</label>
            <input id="cadastro_email" type="email" placeholder="nome@dominio.com.br" required>
        </p>
        <p>
            <label for="cadastro_telefone">Telefone:</label>
            <input id="cadastro_telefone" type="text" placeholder="(27) 99999-9999" required>
        </p>
        <p>

        <p>
            <label for="cadastro_senha">Senha:</label>
            <input id="cadastro_senha" type="password">
        </p>
        <p>
            <label for="cadastro_senha_confirm">Confirme a senha:</label>
            <input id="cadastro_senha_confirm" type="password">
        </p>

        <p>
            <button type="reset" id="btn-limpar" class="btn">Limpar</button>
            <button type="submit" id="btn-salvar" class="btn">Salvar</button>
        </p>
    </form>

    <hr>
    <form>
        <h2>Faça sua Avaliação</h2>




        <tr>
            <td>Pedro</td>
            <td>Avaliação</td>

            <fieldset>
                <input id="estrela_pt" name="Estrela" type="checkbox" value="pt">
                <label for="estrela_pt">1 Estrela</label>
                <input id="estrela_pt" name="Estrela" type="checkbox" value="pt">
                <label for="estrela_pt">2 Estrela</label>
                <input id="estrela_pt" name="Estrela" type="checkbox" value="pt">
                <label for="estrela_pt">3 Estrela</label>
                <input id="estrela_pt" name="Estrela" type="checkbox" value="pt">
                <label for="estrela_pt">4 Estrela</label>
                <input id="estrela_pt" name="Estrela" type="checkbox" value="pt">
                <label for="estrela_pt">5 Estrela</label>
        </tr>
        </fieldset>

    </form>
